services:
  - type: web
    name: quantai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: "true" # Set to true initially to debug deployment issues
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: MC_PATHS
        value: "500"   # Reduced from 2000 to 500 for strict 512MB RAM limit
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LOGURU_LEVEL
        value: "DEBUG"
